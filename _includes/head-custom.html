<!-- PWA: 스마트폰 홈 화면 아이콘 / 앱처럼 실행 -->
<link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
<meta name="theme-color" content="#1e3f66">

<!-- iOS (Safari) 홈 화면 추가 지원 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="지급명령">
<link rel="apple-touch-icon" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">

<!-- 파비콘 -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/icons/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/icons/icon-192.png' | relative_url }}">

<!-- 서비스워커 등록 (오프라인 지원 + 설치 가능) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker
        .register('{{ "/sw.js" | relative_url }}', { scope: '{{ "/" | relative_url }}' })
        .catch(function (err) { console.warn('SW 등록 실패:', err); });
    });
  }
</script>
