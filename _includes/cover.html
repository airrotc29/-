{%- comment -%} 지급명령청구 표지 배너 (홈 상단 히어로) {%- endcomment -%}
<div class="cover-hero">
  <div class="cover-topbar">
    <span class="cover-team">ACE 종합관리 (주) 사업소관리팀</span>
    <img class="cover-brand-logo" src="{{ '/assets/logo.png' | relative_url }}" alt="에이스종합관리(주)">

  </div>

  <div class="cover-body">
    <div class="cover-photo">
      <img src="{{ '/assets/cover/court-building.jpg' | relative_url }}" alt="대한민국 법원"
           onerror="this.style.display='none';this.parentNode.classList.add('cover-photo--empty');">
      <span class="cover-photo-caption">대한민국 법원</span>
    </div>

    <div class="cover-text">
      <div class="cover-emblem">
        <img src="{{ '/assets/icons/icon-192.png' | relative_url }}" alt="" class="cover-emblem-icon">
        <span class="cover-emblem-label">대한민국 법원<br><small>COURT OF KOREA</small></span>
      </div>

      <p class="cover-eyebrow">관리비 미납금</p>
      <h1 class="cover-title">지급명령청구</h1>

      <hr class="cover-divider">

      <ul class="cover-points">
        <li>지급명령 청구 기준 및 청구<span class="cover-hanja">前</span> 준비 사항</li>
        <li>전자소송포탈 지급명령 청구 실무 매뉴얼</li>
      </ul>
    </div>
  </div>
</div>

<style>
  .cover-hero{
    position:relative;
    margin:-2rem calc(50% - 50vw) 2.5rem;   /* 컨텐츠 폭을 벗어나 전체폭으로 */
    padding:clamp(1rem,3vw,2.5rem) clamp(1rem,5vw,4rem);
    background:linear-gradient(120deg,#0d2350 0%,#122c62 55%,#0e2350 100%);
    color:#fff;
    overflow:hidden;
  }
  .cover-hero::before{ /* 좌측 밝은 파랑 액센트 패널 */
    content:"";position:absolute;top:0;left:0;bottom:0;width:min(34%,520px);
    background:linear-gradient(180deg,#2f57c9,#2b4db0);opacity:.55;
    clip-path:polygon(0 0,100% 0,86% 100%,0 100%);pointer-events:none;
  }
  .cover-topbar{
    position:relative;display:flex;justify-content:space-between;align-items:center;
    gap:1rem;flex-wrap:wrap;margin-bottom:clamp(1rem,3vw,2rem);
  }
  .cover-team{font-size:clamp(.72rem,1.4vw,.95rem);color:#cdd8f5;letter-spacing:.02em;}
  .cover-brand-logo{
    height:clamp(26px,3.2vw,40px);width:auto;display:block;
    background:#fff;border-radius:.4em;padding:.25em .45em;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .cover-body{
    position:relative;display:grid;grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);
    gap:clamp(1rem,3vw,2.5rem);align-items:center;
  }
  .cover-photo{
    position:relative;border-radius:.6rem;overflow:hidden;
    aspect-ratio:16/11;min-height:180px;
    background:linear-gradient(160deg,#24325e 0%,#3a2c63 45%,#7a4d8c 100%);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .cover-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .cover-photo-caption{
    position:absolute;left:0;right:0;bottom:0;padding:.5em .8em;
    font-size:.85rem;color:#eef2ff;
    background:linear-gradient(0deg,rgba(6,14,38,.85),transparent);
    opacity:0;transition:opacity .2s;
  }
  .cover-photo--empty .cover-photo-caption{opacity:1;} /* 사진 없을 때만 라벨 표시 */
  .cover-text{min-width:0;}
  .cover-emblem{display:flex;align-items:center;gap:.6em;margin-bottom:.6rem;}
  .cover-emblem-icon{width:clamp(38px,5vw,58px);height:auto;
    background:#fff;border-radius:.4em;padding:.15em;}
  .cover-emblem-label{font-weight:700;line-height:1.05;font-size:clamp(.95rem,2vw,1.35rem);}
  .cover-emblem-label small{font-weight:600;font-size:.62em;letter-spacing:.08em;color:#c7d3f2;}
  .cover-eyebrow{
    margin:.2rem 0 .1rem;color:#7fb2ff;font-weight:700;
    font-size:clamp(1.1rem,3vw,2rem);
  }
  .cover-title{
    margin:0;border:0;color:#fff;font-weight:900;line-height:1;
    font-size:clamp(2.6rem,9vw,6rem);letter-spacing:.06em;
    text-shadow:0 3px 14px rgba(0,0,0,.35);
  }
  .cover-divider{
    border:0;border-top:1px solid rgba(255,255,255,.4);
    margin:clamp(1rem,3vw,1.8rem) 0;max-width:640px;
  }
  .cover-points{list-style:none;margin:0;padding:0;}
  .cover-points li{
    position:relative;padding-left:1.9em;
    font-size:clamp(1rem,2.3vw,1.45rem);font-weight:700;
    margin:.55em 0;color:#f2f5ff;
  }
  .cover-points li::before{
    content:"";position:absolute;left:0;top:.28em;
    width:.85em;height:.85em;border-radius:.18em;
    background:#8ef05a;box-shadow:0 0 0 3px rgba(142,240,90,.25);
  }
  .cover-hanja{font-size:.78em;opacity:.9;padding:0 .05em;}

  @media (max-width:720px){
    .cover-body{grid-template-columns:1fr;}
    .cover-photo{order:2;}
    .cover-hero::before{width:60%;opacity:.4;}
  }
</style>
